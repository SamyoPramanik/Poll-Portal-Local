services:
  server:
    build: ./server
    container_name: pollserver
    depends_on:
      - db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=polldb
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - COOKIE_SECRET=DKSFJSDJAjskdjflsjdkfjsdosgijejg
      - JWT_SECRET=SDGLKSLJGAKSOGISDGBGB654645
  client:
    build:
      context: ./client
      args:
        NEXT_PUBLIC_SERVER_URL: /api
    container_name: pollclient
    environment:
      - NEXT_PUBLIC_SERVER_URL=/api
    depends_on:
      - server
  db:
    image: postgres:15-alpine
    container_name: polldb
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: polldb
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  ngnix:
    image: nginx:alpine
    container_name: pollngnix
    ports:
      - "3000:80"
    depends_on:
      - client
    volumes:
      - ./ngnix/nginx.conf:/etc/nginx/nginx.conf

volumes:
  db-data:
    driver: local

networks:
  default:
    driver: bridge
